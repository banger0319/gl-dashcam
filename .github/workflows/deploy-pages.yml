name: Deploy Flutter Web to GitHub Pages                                                                                             
                                                                                                                                       
  on:                                                                                                                                  
    push:                                                                                                                              
      branches:                                                                                                                        
        - main                                                                                                                         
    workflow_dispatch:                                                                                                                 
                                                                                                                                       
  permissions:                                                                                                                         
    contents: read                                                                                                                     
                                                                                                                                       
  concurrency:                                                                                                                         
    group: pages                                                                                                                       
    cancel-in-progress: true                                                                                                           
                                                                                                                                       
  jobs:                                                                                                                                
    build:                                                                                                                             
      runs-on: ubuntu-latest                                                                                                           
      steps:                                                                                                                           
        - name: Checkout                                                                                                               
          uses: actions/checkout@v4                                                                                                    
                                                                                                                                       
        - name: Set up Flutter                                                                                                         
          uses: subosito/flutter-action@v2                                                                                             
          with:                                                                                                                        
            channel: stable                                                                                                            
                                                                                                                                       
        - name: Resolve base href                                                                                                      
          id: base-href                                                                                                                
          shell: bash                                                                                                                  
          run: |                                                                                                                       
            repo_name="${GITHUB_REPOSITORY#*/}"                                                                                        
            if [[ "$repo_name" == *.github.io ]]; then                                                                                 
              base_href="/"                                                                                                            
            else                                                                                                                       
              base_href="/${repo_name}/"                                                                                               
            fi                                                                                                                         
            echo "value=${base_href}" >> "$GITHUB_OUTPUT"                                                                              
                                                                                                                                       
        - name: Install dependencies                                                                                                   
          run: flutter pub get                                                                                                         
                                                                                                                                       
        - name: Build web app                                                                                                          
          run: flutter build web --release --base-href "${{ steps.base-href.outputs.value }}"                                          
                                                                                                                                       
        - name: Disable Jekyll                                                                                                         
          run: touch build/web/.nojekyll                                                                                               
                                                                                                                                       
        - name: Configure Pages                                                                                                        
          uses: actions/configure-pages@v5                                                                                             
                                                                                                                                       
        - name: Upload artifact                                                                                                        
          uses: actions/upload-pages-artifact@v4                                                                                       
          with:                                                                                                                        
            path: build/web                                                                                                            
                                                                                                                                       
    deploy:                                                                                                                            
      needs: build                                                                                                                     
      runs-on: ubuntu-latest                                                                                                           
      permissions:                                                                                                                     
        pages: write                                                                                                                   
        id-token: write                                                                                                                
      environment:                                                                                                                     
        name: github-pages                                                                                                             
        url: ${{ steps.deployment.outputs.page_url }}                                                                                  
      steps:                                                                                                                           
        - name: Deploy to GitHub Pages                                                                                                 
          id: deployment                                                                                                               
          uses: actions/deploy-pages@v4